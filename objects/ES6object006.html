<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object destructuring without declaration</title>
</head>
<body>
    <script>
        let a,b;

        ({a,b} = {a:'Hello ', b:'Jack'});

        console.log(a+b);
    </script>
</body>
</html>
