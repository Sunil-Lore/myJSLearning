<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spread operator in Array literals.</title>
</head>
<body>
    <script>
        let newArr=['Three','Four'];
        let arr=['One','Two',...newArr,'Five'];
        console.log(arr);
    </script>
</body>
</html>
