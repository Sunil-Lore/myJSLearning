<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object destructuring unpacks properties into distinct variables</title>
</head>
<body>
    <script>
        let obj={h:100,s:true};

        let {h,s}=obj;

        console.log(h);
        console.log(s);
    </script>
</body>
</html>
