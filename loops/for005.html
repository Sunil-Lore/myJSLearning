<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS FOR loop - </title>
</head>
<body>
    <!-- JavaScript FOR loop -->

    <script>
        let arr=[12,5,34,7,90,1,23];
        for(let i=0;i<arr.length;i++){
            console.log(`Element: ${i} = ${arr[i]}`);
        }
    </script>
</body>
</html>
