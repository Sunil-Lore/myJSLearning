<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript FOR OF statement</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        const person = ["BMW",'Volvo','Audi'];
        let txt="";
        for(let x of person){
            txt += x + " ";
        }
        document.getElementById("demo").innerHTML=txt;
    </script>
</body>
</html>
