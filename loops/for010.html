<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Loop (with break)</title>
</head>
<body>
    <script>
        let i=1;
        for(;;){ // No condition => Infinite
          console.log(i);
            if(i==5)break; // stop at 5
            i++;
        }
    </script>
</body>
</html>
