<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS FOR loop - print table of a number</title>
</head>
<body>
    <!-- JavaScript FOR loop -->

    <script>
        let number=2;
        for(let i=1;i<=10;i++){
            console.log(`Number: 2 * ${i} = ${i*number}`);
        }
    </script>
</body>
</html>
