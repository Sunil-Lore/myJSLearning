<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Function</title>
</head>
<body>
    <script>
        // Anonymous function without parameters.
        const greet = function(){
            return 'Hello!';
        }
        console.log(greet());

        // Another function with parameters.
        const valueSum = function(val1,val2){
            return val1+val2;
        }
        console.log(valueSum(2,3));
    </script>
</body>
</html>
