<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Executing function with parameters</title>
</head>
<body>
    <script>
        // Self executing Function (IIFE) with parameters
        (function(name, age) {
            console.log(`Hello, ${name}! You are ${age} years old.`);
        })("Alice", 30);
    </script>
</body>
</html>
