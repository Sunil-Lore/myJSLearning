<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Parameter</title>
</head>
<body>
    <script>
        function sum(...args){
            let total=0;
            for(let arg of args){
                total+=arg;
            }
            return total;
        }
        console.log(sum(4,9,16,25,7,2));
    </script>
</body>
</html>
