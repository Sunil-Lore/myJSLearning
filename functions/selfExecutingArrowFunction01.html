<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Executing Arrow Function</title>
</head>
<body>
    <script>
        // Self executing Arrow Function
        (() => {
            console.log("Hello, World!");
        })();
    </script>
</body>
</html>
