<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrow Function with parameters</title>
</head>
<body>
    <script>
        const myFunction = (a,b) => {
            return a + b;
        };
        console.log(myFunction(5, 10));
    </script>
</body>
</html>
