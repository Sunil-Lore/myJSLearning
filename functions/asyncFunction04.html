<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Function with Promise.allSettled</title>
</head>
<body>
    <script>
        async function multipleTasks() {
  const tasks = [
    new Promise((resolve) => setTimeout(() => resolve("Task A done"), 5000)),
    new Promise((resolve) => setTimeout(() => resolve("Task B done"), 10000)),
    new Promise((resolve) => setTimeout(() => resolve("Task C done"), 15000)),
  ];

  tasks.forEach((task, index) => {
    task.then((result) => console.log(`Task ${index + 1}:`, result));
  });

  const results = await Promise.allSettled(tasks);
  console.log("Final results:", results);
}

multipleTasks();

    </script>
</body>
</html>
