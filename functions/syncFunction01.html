<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Function</title>
</head>
<body>
    <script>
        // Async Function

            console.log("This is an async function");
        }
        myAsyncFunction();
    </script>
</body>
