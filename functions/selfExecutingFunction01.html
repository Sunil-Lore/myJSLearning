<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self executing Function (IIFE)</title>
</head>
<body>
    <script>
        // Self executing Function (IIFE)
        (function() {
            console.log("This is a self executing function");
        })();
    </script>
</body>
</html>
