<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Executing Arrow Function with Parameters</title>
</head>
<body>
    <script>
        // Self executing Arrow Function with parameters
        const MyFunction = ((name, age) => {
            console.log(`Hello, ${name}! You are ${age} years old.`);
        })("Alice", 30);

    </script>
</body>
</html>
