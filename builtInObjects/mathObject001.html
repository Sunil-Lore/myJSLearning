<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Object - sqrt()</title>
</head>
<body>
    <script>
            let n=prompt("Enter a number","");
            let answer=Math.sqrt(n);
            alert('The square root of '+ n + ' is ' + answer );
    </script>
</body>
</html>
