<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Objects</title>
</head>
<body>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <p id="demo3"></p>
    <script>
    let d=new Date();
    let hours=d.getHours();
    let minutes=d.getMinutes();
    let cMonth = d.getMonth()+1;
    document.getElementById('demo1').innerHTML='Current Time: ' +hours +":" + minutes;
    document.getElementById('demo2').innerHTML='Current Year: ' + d.getFullYear();
    document.getElementById('demo3').innerHTML='Current Month: ' + cMonth ;
    </script>
    </script>
    
</body>
</html>
